<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Design by Malina, www.dbm.org.pl">
    <title>DbM Framework - Error</title>
	<link href="../favicon.ico" rel="icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex align-items-center justify-content-center vh-100">
        <div class="text-center">
			<div id="error-container"></div>
			<script>
				document.addEventListener("DOMContentLoaded", () => {
					const urlParams = new URLSearchParams(window.location.search);
					const container = document.querySelector('#error-container');

					if (!container) {
						console.error('Missing #error-container');
						return;
					}

					if (!urlParams.has('code')) {
						window.location.replace("../");
						return;
					}

					const code = urlParams.get('code');
					const codes = {
						401: "Unauthorized!",
						403: "Forbidden!",
						404: "Page not found",
						500: "Internal Server Error!",
						1045: "Access denied!",
						1049: "Unknown database!",
						2002: "Can't connect to server!",
					};

					const errorMessage = codes[code] || "Unknown Error";

					const helpMessage = `<p class="text-muted mt-2">Please try again later or contact the administrator.</p>`;

					const learnMore = !codes[code] ? `<p>Learn more about the <a href="https://www.google.com/search?q=error+${code}" target="_blank"> ERROR ${code}</a></p>` : '';

					container.innerHTML = `
						<h1 class="text-dark">${code} | ${errorMessage}</h1>
						${helpMessage}
						${learnMore}
						<p class="mt-3">
							<button class="btn btn-primary fw-bold px-4" id="go-back-btn">
								Go Back
							</button>
						</p>
					`;

					document.querySelector('#go-back-btn').addEventListener('click', () => {
						window.history.back();
					});
				});
			</script>
        </div>
    </div>
</body>
</html>
